<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento de Site</title>
</head>
<body>
    <h1>Monitoramento doiiie Mudanças no Site</h1>
    <p>Este site monitorará alterações e enviará notificações quando houver mudanças.</p>

    <iframe id="iframe" src="https://time.is/Fortaleza" style="display:none;"></iframe>

    <script>
        // Escutando a mensagem do iframe
        window.addEventListener('message', (event) => {
            if (event.origin !== 'https://time.is/Fortaleza') {
                return; // Ignorar mensagens de origens não confiáveis
            }

            const data = event.data;
            console.log("Dados recebidos do iframe:", data);
            // Aqui você pode processar os dados e verificar mudanças
        });

        // Enviar uma mensagem para o iframe (caso o site externo suporte)
        const iframe = document.getElementById('iframe');
        iframe.onload = () => {
            iframe.contentWindow.postMessage('Pedido de dados', 'https://time.is/Fortaleza');
        };
    </script>
</body>
</html>
