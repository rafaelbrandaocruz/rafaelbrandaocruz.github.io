<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento de Site</title>
</head>
<body>
    <h1>Monitoramento de Mudanças no Site</h1>
    <p>Este site monitorará alterações e enviará notificações quando houver mudanças.</p>

    <!-- Botão para solicitar permissão -->
    <button id="permitirNotificacoesBtn">Ativar Notificações</button>

    <script>
        const siteURL = 'https://time.is/Fortaleza';  // URL do site para monitorar
        let lastContent = '';

        // Função para verificar alterações no site
        async function monitorarSite() {
            const response = await fetch(siteURL);
            const text = await response.text();

            alert(response);

            if (text !== lastContent) {
                lastContent = text;
                console.log("Mudança detectada no site!");
                // Enviar notificação quando houver uma mudança
                sendNotification();
            } else {
                console.log("Nenhuma mudança detectada.");
            }
        }

        // Função para enviar a notificação
        function sendNotification() {
            if (Notification.permission === "granted") {
                new Notification("Mudança no Site!", {
                    body: "O conteúdo do site foi alterado!",
                    icon: "https://rafaelbrandaocruz.github.io/favicon.ico",
                });
            }
        }

        // Função para solicitar permissão de notificação
        function askNotificationPermission() {
            // Solicitar permissão apenas após a interação do usuário
            if (Notification.permission !== "granted") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        console.log("Permissão para notificações concedida.");
                    }
                });
            }
        }

        // Função que será chamada quando o usuário clicar no botão
        document.getElementById('permitirNotificacoesBtn').addEventListener('click', function() {
            askNotificationPermission();
        });

        // Verificar mudanças no site periodicamente
        setInterval(monitorarSite, 6000);  // A cada 60 segundos
    </script>

    
    <script>
    // Verificar se o Service Worker é suportado pelo navegador
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
            .then(function(registration) {
                console.log('Service Worker registrado com sucesso:', registration);
            })
            .catch(function(error) {
                console.log('Falha ao registrar o Service Worker:', error);
            });
    }
</script>
</body>
</html>
